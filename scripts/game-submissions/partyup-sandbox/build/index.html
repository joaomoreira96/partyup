<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>PartyUp Sandbox</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1020;
        --panel: #151d33;
        --accent: #818cf8;
        --accent-hot: #f472b6;
        --text: #f8fafc;
        --muted: #94a3b8;
      }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
        background: radial-gradient(circle at top, #1e1b4b, var(--bg));
        color: var(--text);
      }
      .shell {
        display: grid;
        grid-template-rows: auto 1fr auto;
        height: 100%;
        max-width: 640px;
        margin: 0 auto;
        padding: 1rem;
        gap: 0.75rem;
      }
      .hud {
        display: flex;
        justify-content: space-between;
        gap: 0.75rem;
        align-items: center;
        background: color-mix(in srgb, var(--panel) 88%, transparent);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 1rem;
        padding: 0.75rem 1rem;
      }
      .hud strong { font-size: 1.25rem; }
      .hud span { color: var(--muted); font-size: 0.85rem; }
      .arena {
        position: relative;
        border-radius: 1.25rem;
        border: 1px solid rgba(255,255,255,0.08);
        background: color-mix(in srgb, var(--panel) 92%, transparent);
        overflow: hidden;
        touch-action: manipulation;
      }
      .center {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 1rem;
        text-align: center;
      }
      .center p { color: var(--muted); margin: 0.5rem 0 0; }
      .btn {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 0.85rem 1.4rem;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        background: linear-gradient(135deg, var(--accent), #6366f1);
        color: white;
        box-shadow: 0 10px 30px rgba(99,102,241,0.35);
      }
      .btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        box-shadow: none;
      }
      .target {
        position: absolute;
        width: 72px;
        height: 72px;
        border-radius: 50%;
        border: 0;
        background: radial-gradient(circle at 30% 30%, #fff, var(--accent-hot));
        box-shadow: 0 0 24px rgba(244,114,182,0.55);
        cursor: pointer;
        transform: translate(-50%, -50%);
      }
      .footer {
        text-align: center;
        color: var(--muted);
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="hud">
        <div>
          <span>Pontos</span>
          <strong id="score">0</strong>
        </div>
        <div style="text-align:center">
          <span>Tempo</span>
          <strong id="timer">30</strong>
        </div>
        <div style="text-align:right">
          <span id="player-label">Jogador</span>
          <strong id="player-name">…</strong>
        </div>
      </div>

      <div class="arena" id="arena">
        <div class="center" id="overlay">
          <div>
            <h1 style="margin:0;font-size:1.5rem">PartyUp Sandbox</h1>
            <p id="status">A ligar ao SDK…</p>
            <button class="btn" id="btn-start" type="button" disabled>Iniciar ronda</button>
          </div>
        </div>
      </div>

      <p class="footer">Pipeline V2 · SDK 1.0 · Toca nos alvos antes do tempo acabar</p>
    </div>

    <script src="./partyup-sdk.js"></script>
    <script>
      (function () {
        var ROUND_MS = 30000;
        var score = 0;
        var playing = false;
        var startedAt = 0;
        var timerId = null;
        var targetEl = null;
        var init = null;

        var scoreEl = document.getElementById("score");
        var timerEl = document.getElementById("timer");
        var statusEl = document.getElementById("status");
        var overlayEl = document.getElementById("overlay");
        var startBtn = document.getElementById("btn-start");
        var arenaEl = document.getElementById("arena");
        var playerNameEl = document.getElementById("player-name");

        function setStatus(text) {
          statusEl.textContent = text;
        }

        function randomPosition() {
          var pad = 48;
          var rect = arenaEl.getBoundingClientRect();
          return {
            x: pad + Math.random() * (rect.width - pad * 2),
            y: pad + Math.random() * (rect.height - pad * 2),
          };
        }

        function removeTarget() {
          if (targetEl) {
            targetEl.remove();
            targetEl = null;
          }
        }

        function spawnTarget() {
          removeTarget();
          var pos = randomPosition();
          targetEl = document.createElement("button");
          targetEl.type = "button";
          targetEl.className = "target";
          targetEl.style.left = pos.x + "px";
          targetEl.style.top = pos.y + "px";
          targetEl.setAttribute("aria-label", "Alvo");
          targetEl.onclick = onTargetHit;
          arenaEl.appendChild(targetEl);
        }

        function onTargetHit() {
          if (!playing) return;
          score += 1;
          scoreEl.textContent = String(score);
          PartyUp.reportScore(score);
          spawnTarget();
        }

        function tickTimer() {
          var elapsed = Date.now() - startedAt;
          var remaining = Math.max(0, ROUND_MS - elapsed);
          timerEl.textContent = String(Math.ceil(remaining / 1000));
          if (remaining <= 0) {
            finishRound();
          }
        }

        function finishRound() {
          if (!playing) return;
          playing = false;
          clearInterval(timerId);
          timerId = null;
          removeTarget();
          overlayEl.style.display = "grid";
          startBtn.disabled = false;
          setStatus("A guardar resultado…");

          var durationMs = Date.now() - startedAt;
          PartyUp.endGame({ score: score, durationMs: durationMs })
            .then(function (result) {
              var ranked = result && result.ranked;
              setStatus(
                "Fim! " +
                  score +
                  " pts" +
                  (ranked ? " · ranking atualizado" : " · convidado (sem ranking)")
              );
            })
            .catch(function (err) {
              setStatus((err && err.userMessage) || "Erro ao guardar resultado");
            });
        }

        function startRound() {
          score = 0;
          scoreEl.textContent = "0";
          timerEl.textContent = String(ROUND_MS / 1000);
          playing = true;
          startedAt = Date.now();
          overlayEl.style.display = "none";
          startBtn.disabled = true;
          spawnTarget();
          timerId = setInterval(tickTimer, 100);
          PartyUp.startGame().catch(function (err) {
            playing = false;
            overlayEl.style.display = "grid";
            setStatus((err && err.userMessage) || "Não foi possível iniciar");
          });
        }

        startBtn.addEventListener("click", startRound);

        PartyUp.ready()
          .then(function (data) {
            init = data;
            var name =
              (data.user && data.user.displayName) ||
              (init.language === "en" ? "Player" : "Jogador");
            playerNameEl.textContent = name;
            setStatus(
              init.language === "en"
                ? "Tap targets for 30 seconds"
                : "Toca nos alvos durante 30 segundos"
            );
            startBtn.disabled = false;
          })
          .catch(function () {
            setStatus("SDK indisponível");
          });
      })();
    </script>
  </body>
</html>
